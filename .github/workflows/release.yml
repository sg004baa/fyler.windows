name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # タグとワークスペースバージョンの不一致を早期に落とす
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "fyler-app") | .version')"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION != Cargo.toml workspace version $CARGO_VERSION"
            exit 1
          fi

  # Windowsネイティブでテスト → releaseビルド → zip + sha256 → GitHub Release
  build-and-publish:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Build release binary
        run: cargo build --release --locked -p fyler-app
      - name: Package
        shell: pwsh
        run: |
          $name = "fyler-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item target/release/fyler.exe "dist/$name/"
          Copy-Item README.md "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
      - name: Create GitHub Release
        shell: pwsh
        run: gh release create "${{ github.ref_name }}" (Get-Item dist/*.zip, dist/*.sha256) --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
