name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # fmt + clippy(警告ゼロがプロジェクトルール)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Linuxで走るテストはすべて実行(nvim必須テストは #[ignore] 済み)
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --locked

  # cfg(windows)ブロックの型・lintエラーをLinux上で検出(AGENTS.md M5以降の恒常ゲート)
  cross-windows-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy cfg(windows) code (deny warnings)
        run: cargo clippy --workspace --all-targets --locked --target x86_64-pc-windows-gnu -- -D warnings

  # 本来のターゲット。Windowsネイティブでビルド+テスト
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Test workspace
        run: cargo test --workspace --locked
